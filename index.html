<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Correlate Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      text-align: center;
      padding: 2rem;
    }
    h1 {
      font-size: 2.5rem;
      font-weight: 300;
      letter-spacing: 0.1em;
      margin-bottom: 0.5rem;
    }
    .status {
      color: #4ade80;
      font-size: 0.875rem;
      text-transform: uppercase;
      letter-spacing: 0.2em;
    }
    .meta {
      margin-top: 2rem;
      color: #666;
      font-size: 0.75rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>correlate</h1>
    <p class="status">deployed</p>
    <p class="meta">CI/CD pipeline active &middot; auto-deploy from main</p>
  </div>
</body>
</html>
