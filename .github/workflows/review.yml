name: Claude Visual Review

on:
  workflow_run:
    workflows: ["Deploy Dashboard"]
    types: [completed]
  workflow_dispatch:
    inputs:
      page_url:
        description: "URL of deployed page to review"
        required: false
        type: string

permissions:
  contents: write
  issues: write
  actions: read

concurrency:
  group: review
  cancel-in-progress: true

jobs:
  test-and-heal:
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.conclusion == 'success' ||
      github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Puppeteer
        run: npm install puppeteer@latest

      - name: Determine review URL
        id: url
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.page_url }}" ]; then
            echo "review_url=${{ inputs.page_url }}" >> "$GITHUB_OUTPUT"
          else
            echo "review_url=${{ secrets.PAGES_URL }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Wait for Pages CDN propagation
        run: sleep 30

      - name: Run browser tests
        id: test
        run: |
          node << 'TESTSCRIPT'
          const puppeteer = require('puppeteer');
          const fs = require('fs');

          (async () => {
            const url = process.env.REVIEW_URL;
            const results = {
              url,
              timestamp: new Date().toISOString(),
              console_errors: [],
              js_exceptions: [],
              network_errors: [],
              page_title: '',
              checks: {},
              pass: true
            };

            const browser = await puppeteer.launch({
              headless: 'new',
              args: ['--no-sandbox', '--disable-setuid-sandbox']
            });

            try {
              const page = await browser.newPage();

              // Capture console errors (ignore favicon and other non-app resources)
              page.on('console', msg => {
                if (msg.type() === 'error') {
                  const text = msg.text();
                  const loc = msg.location();
                  const isFavicon = (loc?.url || '').includes('favicon');
                  const isResourceLoad = text.includes('Failed to load resource');
                  // Ignore CORS/network errors from external APIs (expected in browser)
                  const isApiError = text.includes('api.robinhood') || text.includes('finance.yahoo') || text.includes('alphavantage') || text.includes('corsproxy') || text.includes('ERR_NAME_NOT_RESOLVED') || text.includes('net::ERR');
                  if (isFavicon || isApiError || (isResourceLoad && !(loc?.url || '').includes('index'))) return;
                  results.console_errors.push({ text, location: loc });
                }
              });

              // Capture uncaught exceptions
              page.on('pageerror', err => {
                results.js_exceptions.push({
                  message: err.message,
                  stack: err.stack
                });
                results.pass = false;
              });

              // Capture failed network requests (but ignore external API failures)
              page.on('requestfailed', req => {
                const reqUrl = req.url();
                if (reqUrl.includes('api.robinhood') || reqUrl.includes('finance.yahoo') || reqUrl.includes('alphavantage') || reqUrl.includes('corsproxy')) return;
                results.network_errors.push({
                  url: reqUrl,
                  failure: req.failure()?.errorText
                });
              });

              // Navigate and wait for full load
              const response = await page.goto(url, {
                waitUntil: 'networkidle0',
                timeout: 30000
              });

              results.http_status = response.status();
              results.page_title = await page.title();

              // Wait extra for Chart.js rendering and simulated data
              await new Promise(r => setTimeout(r, 8000));

              // Run checks in browser context
              results.checks = await page.evaluate(() => {
                const html = document.documentElement.innerHTML;
                const checks = {};

                // Check page loaded with content
                checks.has_content = document.body.innerText.length > 100;

                // Check for ticker mentions
                checks.has_spy = html.includes('SPY');
                checks.has_uso = html.includes('USO');

                // Check for chart canvases that have been rendered
                const canvases = document.querySelectorAll('canvas');
                checks.canvas_count = canvases.length;
                checks.has_charts = canvases.length > 0;

                // Check for stat cards with values
                const statValues = [...document.querySelectorAll('.stat-value')];
                checks.stat_card_count = statValues.length;
                checks.has_correlation_stats = statValues.some(el =>
                  /[−+-]?0\.\d+/.test(el.textContent) || /\d+\.\d+/.test(el.textContent)
                );

                // Check for realtime UI elements
                checks.has_status_badge = document.querySelector('.status-badge') !== null;
                checks.has_symbol_selects = document.querySelectorAll('.symbol-select').length >= 2;
                checks.has_backfill_buttons = document.querySelectorAll('.backfill-group .btn').length >= 3;
                checks.has_watchlist = document.getElementById('watchlist') !== null;
                checks.has_dropzone = document.getElementById('dropzone') !== null;
                checks.has_log_area = document.getElementById('logArea') !== null;

                // Check for navigation tabs
                const tabs = document.querySelectorAll('.nav-tab');
                checks.tab_count = tabs.length;
                checks.tab_names = [...tabs].map(t => t.textContent.trim());

                // Check visible text isn't showing errors
                const bodyText = document.body.innerText;
                checks.no_visible_errors = !bodyText.includes('undefined') &&
                                           !bodyText.includes('NaN') &&
                                           !bodyText.includes('[object Object]');

                // Check that data is being displayed (prices or simulated)
                const priceElements = statValues.filter(el => /\d+\.\d{2}/.test(el.textContent));
                checks.has_price_data = priceElements.length > 0;

                return checks;
              });

              // Mark pass/fail based on checks
              if (!results.checks.has_content) results.pass = false;
              if (!results.checks.has_spy || !results.checks.has_uso) results.pass = false;
              if (!results.checks.has_charts) results.pass = false;
              if (!results.checks.no_visible_errors) results.pass = false;
              if (results.http_status !== 200) results.pass = false;
              if (results.console_errors.length > 0) results.pass = false;

            } catch (err) {
              results.js_exceptions.push({ message: err.message, stack: err.stack });
              results.pass = false;
            } finally {
              await browser.close();
            }

            fs.writeFileSync('/tmp/test_results.json', JSON.stringify(results, null, 2));
            console.log(JSON.stringify(results, null, 2));

            // Set outputs
            const outputFile = process.env.GITHUB_OUTPUT;
            fs.appendFileSync(outputFile, `pass=${results.pass}\n`);
            fs.appendFileSync(outputFile, `error_count=${results.js_exceptions.length + results.console_errors.length}\n`);
          })();
          TESTSCRIPT
        env:
          REVIEW_URL: ${{ steps.url.outputs.review_url }}

      - name: Post results to commit
        if: always()
        run: |
          python3 << 'PYEOF'
          import json, os, subprocess

          with open('/tmp/test_results.json') as f:
              r = json.load(f)

          passed = r.get('pass', False)
          emoji = "✅" if passed else "❌"
          checks = r.get('checks', {})

          def yn(v):
              return "✅" if v else "❌"

          lines = [
              f"## {emoji} Dashboard Test Results",
              f"**URL:** {r['url']}",
              f"**HTTP Status:** {r.get('http_status', 'N/A')}",
              f"**Page Title:** {r.get('page_title', 'N/A')}",
              "",
              "### Runtime Checks",
              "| Check | Result |",
              "|-------|--------|",
              f"| Page has content | {yn(checks.get('has_content'))} |",
              f"| SPY ticker present | {yn(checks.get('has_spy'))} |",
              f"| USO ticker present | {yn(checks.get('has_uso'))} |",
              f"| Charts rendered ({checks.get('canvas_count', 0)} canvases) | {yn(checks.get('has_charts'))} |",
              f"| Stat cards with data | {yn(checks.get('has_correlation_stats'))} |",
              f"| Price data displayed | {yn(checks.get('has_price_data'))} |",
              f"| Status badge present | {yn(checks.get('has_status_badge'))} |",
              f"| Symbol selectors | {yn(checks.get('has_symbol_selects'))} |",
              f"| Backfill buttons | {yn(checks.get('has_backfill_buttons'))} |",
              f"| Watchlist | {yn(checks.get('has_watchlist'))} |",
              f"| Data dropzone | {yn(checks.get('has_dropzone'))} |",
              f"| Activity log | {yn(checks.get('has_log_area'))} |",
              f"| No visible NaN/undefined | {yn(checks.get('no_visible_errors'))} |",
              f"| Zero JS exceptions | {yn(len(r.get('js_exceptions', [])) == 0)} |",
              f"| Zero console errors | {yn(len(r.get('console_errors', [])) == 0)} |",
          ]

          if r.get('js_exceptions'):
              lines.append("")
              lines.append("### JS Exceptions")
              for e in r['js_exceptions']:
                  lines.append(f"```\n{e['message']}\n```")

          if r.get('console_errors'):
              lines.append("")
              lines.append("### Console Errors")
              for e in r['console_errors']:
                  lines.append(f"- `{e['text']}`")

          if r.get('network_errors'):
              lines.append("")
              lines.append("### Network Errors")
              for e in r['network_errors']:
                  lines.append(f"- `{e['url']}`: {e.get('failure', 'unknown')}")

          lines.append("")
          lines.append(f"*Browser test at {r['timestamp']}*")

          body = "\n".join(lines)

          # Write to step summary
          with open(os.environ['GITHUB_STEP_SUMMARY'], 'a') as f:
              f.write(body)

          # Save for autofix step
          with open('/tmp/review_body.md', 'w') as f:
              f.write(body)

          PYEOF

      - name: Auto-fix if tests failed
        if: steps.test.outputs.pass == 'false'
        id: fix
        run: |
          echo "Tests failed — asking Claude to fix..."

          # Read test results and source code
          TEST_RESULTS=$(cat /tmp/test_results.json)
          SOURCE_CODE=$(cat index.html)

          python3 << 'FIXEOF'
          import json, sys, os, subprocess

          with open('/tmp/test_results.json') as f:
              results = json.load(f)

          with open('index.html') as f:
              source = f.read()

          errors = []
          for e in results.get('js_exceptions', []):
              errors.append(f"JS Exception: {e['message']}")
          for e in results.get('console_errors', []):
              errors.append(f"Console Error: {e['text']}")
          checks = results.get('checks', {})
          if not checks.get('no_visible_errors'):
              errors.append("Page shows NaN, undefined, or [object Object] in visible text")
          if not checks.get('has_charts'):
              errors.append("No chart canvases were rendered")

          error_text = "\n".join(errors)

          # Build Claude API request
          payload = {
              "model": "claude-sonnet-4-6",
              "max_tokens": 16000,
              "system": (
                  "You are a code fixer. You will be given an index.html file and a list of "
                  "runtime errors caught by automated browser tests. Return ONLY the complete "
                  "fixed index.html file. No explanation, no markdown fences, no commentary — "
                  "just the raw HTML that should replace the file contents. Fix all reported "
                  "errors. Do not remove features or simplify the code — only fix bugs."
              ),
              "messages": [{
                  "role": "user",
                  "content": (
                      f"## Errors found by browser tests\n\n{error_text}\n\n"
                      f"## Full test results\n\n```json\n{json.dumps(results, indent=2)}\n```\n\n"
                      f"## Current index.html\n\n{source}"
                  )
              }]
          }

          import urllib.request

          req = urllib.request.Request(
              "https://api.anthropic.com/v1/messages",
              data=json.dumps(payload).encode(),
              headers={
                  "x-api-key": os.environ["ANTHROPIC_API_KEY"],
                  "anthropic-version": "2023-06-01",
                  "content-type": "application/json"
              }
          )

          try:
              with urllib.request.urlopen(req, timeout=300) as resp:
                  response = json.loads(resp.read())

              fixed_html = response["content"][0]["text"]

              # Strip markdown fences if Claude added them anyway
              import re
              fixed_html = re.sub(r'^\s*```(?:html)?\s*\n?', '', fixed_html)
              fixed_html = re.sub(r'\n?\s*```\s*$', '', fixed_html)

              with open('index.html', 'w') as f:
                  f.write(fixed_html)

              print("Fix applied successfully")

              with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                  f.write("fixed=true\n")

          except Exception as e:
              print(f"Fix failed: {e}")
              with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                  f.write("fixed=false\n")

          FIXEOF
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit and push fix
        if: steps.fix.outputs.fixed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "autofix: resolve runtime errors caught by browser tests

          Errors fixed by Claude claude-sonnet-4-6 based on Puppeteer test results.
          This commit triggers a new deploy + review cycle."
            git push origin main
          fi
