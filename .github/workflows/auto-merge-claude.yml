name: Auto-merge Claude branches

on:
  push:
    branches: ["claude/**"]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create PR and merge
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.ref.replace('refs/heads/', '');
            console.log(`Processing branch: ${branch}`);

            // Create a pull request
            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Auto-merge: ${branch}`,
              head: branch,
              base: 'main',
              body: `Automated PR from Claude Code branch \`${branch}\`.\n\nThis will be auto-merged to trigger a GitHub Pages deploy.`
            });
            console.log(`Created PR #${pr.number}`);

            // Small delay to let GitHub process the PR
            await new Promise(r => setTimeout(r, 5000));

            // Merge the PR
            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              merge_method: 'squash'
            });
            console.log(`Merged PR #${pr.number}`);
